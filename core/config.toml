# XiJian API server configuration.
# Single source of truth for everything API-related: server, auth,
# storage layout (including model checkpoints), backend selection,
# model registry, AI runtime defaults, and feature toggles.
#
# Location is resolved by xijian_api.config: $XIJIAN_CONFIG > ./config.toml
# > <repo>/config.toml. Copy this file to one of those paths and edit.

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------

[server]
host = "0.0.0.0"
port = 18500
dev = false
keep_token_file = false
testing = false
api_version = "1.0.0"

# ---------------------------------------------------------------------------
# Auth
# ---------------------------------------------------------------------------

[auth]
token_file = "/tmp/xijian-{pid}.token"

# ---------------------------------------------------------------------------
# Storage layout — single base directory, per-type subfolders.
#
# All model checkpoints + user uploads live under `base_dir`.  Model
# files are kept under `<base_dir>/<models_subdir>/<type>/<id>/<file>`
# (created on demand by the backend loader).  ``models_subdir`` exists
# so operators who want to put checkpoints on a different filesystem
# (symlink, separate volume, etc.) only edit one field.
# ---------------------------------------------------------------------------

[storage]
base_dir = "~/.xijian"
files_subdir = "files"
models_subdir = "models"     # 统一存放所有模型权重；具体路径见 [[models]]
snapshots_subdir = "snapshots"
audit_subdir = "audit"

# ---------------------------------------------------------------------------
# Backend preference per task.  When the default backend is not
# installed (e.g. mlx on Linux, llama-cpp on bare macOS), the next
# fallback in the list is tried.  ``available`` can be set to false to
# completely disable a backend without removing the entry.
# ---------------------------------------------------------------------------

[backends.chat]
default = "mlx"
fallbacks = ["gguf"]

[backends.embeddings]
default = "mlx"
fallbacks = ["gguf"]

[backends.tts]
default = "mlx"
fallbacks = ["gguf"]

[backends.stt]
default = "mlx"
fallbacks = ["gguf"]

[backends.image]
default = "mlx"
fallbacks = ["gguf"]

[backends.video]
default = "mlx"
fallbacks = ["gguf"]

# ---------------------------------------------------------------------------
# OpenAI-compatible remote backend — global defaults.
#
# Any [[models]] entry with ``backend = "openai"`` inherits these.
# Per-model ``[[models]].extra`` fields override them.  Env vars
# (``OPENAI_API_KEY``, ``OPENAI_BASE_URL``) are the last fallback so
# secrets don't need to live in config files.
#
# ``transport`` selects the HTTP client: ``httpx`` (default, always
# available) or ``openai_sdk`` (requires the ``openai`` package).
#
# ``video_endpoint`` is the path appended to ``base_url`` for video
# generation.  Set to empty string to disable video on remote backends.
# ---------------------------------------------------------------------------

[backends.openai]
base_url = ""              # empty = https://api.openai.com/v1
api_key = ""               # empty = $OPENAI_API_KEY
default_model = ""         # e.g. "gpt-4o" — usually overridden per-model
transport = "httpx"
headers = {}
video_endpoint = "/video/generations"

# ---------------------------------------------------------------------------
# AI runtime defaults — used when a request does not specify one.
# ---------------------------------------------------------------------------

[ai]
default_max_new_tokens = 1024
default_context_length = 8192
mlx_cache_dir = ""           # empty = mlx default; set "~/.cache/mlx" to pin
gguf_n_ctx = 4096
gguf_n_threads = 0           # 0 = auto-detect
gguf_n_gpu_layers = 0        # 0 = CPU only; >0 = offload N layers to Metal/CUDA

# ---------------------------------------------------------------------------
# Model registry.  One entry per physical checkpoint.
#
# Field reference:
#   id              — short stable id used in API paths (``/v1/models/<id>``)
#   type            — chat | embeddings | tts | stt | image | video
#   backend         — mlx | gguf
#   filename        — model file (or directory for mlx) name; resolved
#                     against `<storage.base_dir>/<storage.models_subdir>/<type>/<id>/`
#   family          — model family hint (qwen2.5, llama3, ...); informational
#   size_b          — approximate parameter count in billions; informational
#   quant           — quantization tag (q4_k_m, 4bit, fp16, ...); informational
#   context_length  — context window in tokens
#   min_ram_gb      — minimum RAM to load; informational, not enforced
#   loaded          — initial load state.  Normally leave false; flip to
#                     true once the checkpoint is on disk and you want
#                     it warm at startup.
#
# No models are registered by default.  Add your own below, then either
# restart the API or POST /v1/models/<id>/load to bring it online.
# ---------------------------------------------------------------------------

# Test/dev fixtures.  These three entries back the in-tree test suite
# (tests/test_models.py expects them by id) and any local ``curl``
# exercise of the load/chat routes.  All three use the ``mock`` chat
# backend so they run on any host without mlx/llama_cpp installed and
# without real weights on disk — production deployments must replace
# ``backend = "mock"`` with ``"mlx"`` or ``"gguf"`` and point
# ``filename`` at the actual checkpoint.

[[models]]
id = "qwen2.5-7b-mlx-4bit"
type = "chat"
backend = "mock"
filename = "Qwen2.5-7B-Instruct-4bit"
family = "qwen2.5"
size_b = 7.0
quant = "4bit"
context_length = 32768
min_ram_gb = 8
loaded = false

[[models]]
id = "qwen2.5-14b-mlx-4bit"
type = "chat"
backend = "mock"
filename = "Qwen2.5-14B-Instruct-4bit"
family = "qwen2.5"
size_b = 14.0
quant = "4bit"
context_length = 32768
min_ram_gb = 16
loaded = false

[[models]]
id = "qwen2.5-7b-gguf-q4km"
type = "chat"
backend = "mock"
filename = "qwen2.5-7b-instruct-q4_k_m.gguf"
family = "qwen2.5"
size_b = 7.0
quant = "q4_k_m"
context_length = 8192
min_ram_gb = 8
loaded = false

# Example: remote OpenAI-compatible chat model.  Uncomment and fill in
# your base_url + api_key (or set $OPENAI_API_KEY) to use a remote
# endpoint instead of a local backend.
#
# [[models]]
# id = "gpt-4o-remote"
# type = "chat"
# backend = "openai"
# filename = ""               # unused for remote; keep empty
# family = "gpt-4o"
# context_length = 128000
# loaded = false
# [models.extra]
# model_name = "gpt-4o"
# base_url = "https://api.openai.com/v1"   # or your compatible endpoint
# api_key = ""                              # or set $OPENAI_API_KEY

# ---------------------------------------------------------------------------
# Feature toggles
# ---------------------------------------------------------------------------

[features]
# When ``seed_default_data`` is false the in-memory stub stores start
# empty.  Flip it on only for local demos where you want a pre-populated
# character / world / interaction set out of the box.
seed_default_data = false
protection_module = true
rate_limit = false
dev_test_emit = false

# ---------------------------------------------------------------------------
# System overload protection (A5.4)
#
# ``overload_monitor`` flips the background 1-Hz sampler on / off.
# It defaults to true so production deployments run the guard; the
# test suite and CI set ``XIJIAN_OVERLOAD_MONITOR=0`` instead of
# editing this file.
#
# ``overload_tier`` is the *recommended default* at first boot.  The
# user can change it at runtime via PATCH /v1/xijian/overload/tier.
# Per the function list v2.1, ``medium`` is right for Mac mini /
# Mac Studio and most MacBook Pros; ``strict`` is right for MacBook
# Air (fan-less).
# ---------------------------------------------------------------------------

[overload]
monitor = true
tier = "medium"