              schema:
                type: object

  # ===========================================================================
  # 12. 取消与中断
  # ===========================================================================
  /chat/abort:
    post:
      tags: [abort]
      operationId: abortChat
      summary: 取消流式对话生成（按 request_id 停止）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_id]
              properties:
                request_id:
                  type: string
                  example: req_8f3a2b1c
      responses:
        "204":
          $ref: "#/components/responses/NoContent"

  /xijian/generation/abort:
    post:
      tags: [abort]
      operationId: abortGeneration
      summary: 中断任意进行中的生成任务（TTS/图像/视频）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_id]
              properties:
                request_id:
                  type: string
                scope:
                  type: string
                  enum: [all, chat, tts, image, video]
                  default: all
      responses:
        "204":
          $ref: "#/components/responses/NoContent"

  # ===========================================================================
  # 13. 隙间扩展层 - 角色（Character）
  # ===========================================================================
  /xijian/characters:
    post:
      tags: [xijian.character]
      operationId: createCharacter
      summary: 创建角色（管理员/创作者）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterCreate"
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
    get:
      tags: [xijian.character]
      operationId: listCharacters
      summary: 分页列出已加载角色
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Order"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Before"
      responses:
        "200":
          description: 角色列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterList"

  /xijian/characters/{character_id}:
    get:
      tags: [xijian.character]
      operationId: getCharacter
      summary: 获取角色详情
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      responses:
        "200":
          description: 角色详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [xijian.character]
      operationId: updateCharacter
      summary: 更新角色
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterUpdate"
      responses:
        "200":
          description: 已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
    delete:
      tags: [xijian.character]
      operationId: deleteCharacter
      summary: 删除角色
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"

  /xijian/characters/{character_id}/load:
    post:
      tags: [xijian.character]
      operationId: loadCharacter
      summary: 加载角色到当前 session
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      responses:
        "200":
          description: 已加载
          content:
            application/json:
              schema:
                type: object

  /xijian/characters/{character_id}/unload:
    post:
      tags: [xijian.character]
      operationId: unloadCharacter
      summary: 卸载角色
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      responses:
        "200":
          description: 已卸载
          content:
            application/json:
              schema:
                type: object

  /xijian/characters/{character_id}/interact:
    post:
      tags: [xijian.character]
      operationId: characterInteract
      summary: 触发角色互动
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [interaction_id]
              properties:
                interaction_id:
                  type: string
                context:
                  type: object
                  properties:
                    location:
                      type: string
                    time_of_day:
                      type: string
                idempotency_key:
                  type: string
      responses:
        "200":
          description: 互动结果
          content:
            application/json:
              schema:
                type: object

  /xijian/characters/{character_id}/state:
    get:
      tags: [xijian.character]
      operationId: getCharacterState
      summary: 获取角色当前状态（好感度、心情、最近记忆摘要等）
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      responses:
        "200":
          description: 状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterState"
    post:
      tags: [xijian.character]
      operationId: updateCharacterState
      summary: 更新角色状态（受保护模块约束）
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterStateUpdate"
      responses:
        "200":
          description: 已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterState"

  # ===========================================================================
  # 14. 隙间扩展层 - 互动（Interaction）
  # ===========================================================================
  /xijian/interactions:
    get:
      tags: [xijian.interaction]
      operationId: listInteractions
      summary: 列出可用互动类型
      responses:
        "200":
          description: 互动列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteractionList"

  /xijian/interactions/{interaction_id}/trigger:
    post:
      tags: [xijian.interaction]
      operationId: triggerInteraction
      summary: 手动触发互动（绕过角色自主决策）
      parameters:
        - $ref: "#/components/parameters/InteractionId"
      responses:
        "200":
          description: 触发结果
          content:
            application/json:
              schema:
                type: object

  /xijian/interactions/{interaction_id}/responses:
    get:
      tags: [xijian.interaction]
      operationId: getInteractionResponses
      summary: 查询某互动下角色可能的所有回应与动作映射
      parameters:
        - $ref: "#/components/parameters/InteractionId"
      responses:
        "200":
          description: 回应列表
          content:
            application/json:
              schema:
                type: object

  # ===========================================================================
  # 15. 隙间扩展层 - 世界（World）
  # ===========================================================================
  /xijian/worlds:
    get:
      tags: [xijian.world]
      operationId: listWorlds
      summary: 列出已加载世界
      responses:
        "200":
          description: 世界列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorldList"

  /xijian/worlds/{world_id}/transition:
    post:
      tags: [xijian.world]
      operationId: worldTransition
      summary: 世界内地点切换（交通方式）
      parameters:
        - $ref: "#/components/parameters/WorldId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_location, to_location]
              properties:
                from_location:
                  type: string
                to_location:
                  type: string
                transport:
                  type: string
                  enum: [walking, bicycle, train, taxi, teleport, horse]
                eta_seconds:
                  type: integer
      responses:
        "200":
          description: 切换结果
          content:
            application/json:
              schema:
                type: object

  /xijian/worlds/{world_id}/state:
    get:
      tags: [xijian.world]
      operationId: getWorldState
      summary: 获取世界状态（经济/健康/饮食/体力/心智等维度）
      parameters:
        - $ref: "#/components/parameters/WorldId"
      responses:
        "200":
          description: 世界状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorldState"
    patch:
      tags: [xijian.world]
      operationId: updateWorldState
      summary: 更新世界状态值（受保护模块约束）
      parameters:
        - $ref: "#/components/parameters/WorldId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorldStateUpdate"
      responses:
        "200":
          description: 已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorldState"

  /xijian/worlds/{world_id}/event:
    post:
      tags: [xijian.world]
      operationId: injectWorldEvent
      summary: 注入世界事件（剧情向）
      parameters:
        - $ref: "#/components/parameters/WorldId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                kind:
                  type: string
                  enum: [common, custom, incident]
                name:
                  type: string
                description:
                  type: string
                trigger_config:
                  type: object
                priority:
                  type: integer
                is_enabled:
                  type: boolean
      responses:
        "200":
          description: 已注入
          content:
            application/json:
              schema:
                type: object

  # ===========================================================================
  # 16. 隙间扩展层 - 记忆（Memory）
  # ===========================================================================
  /xijian/memory/entries:
    post:
      tags: [xijian.memory]
      operationId: createMemoryEntry
      summary: 新增记忆条目
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryEntryCreate"
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntry"
    get:
      tags: [xijian.memory]
      operationId: listMemoryEntries
      summary: 分页 + 过滤查询记忆条目
      parameters:
        - name: character_id
          in: query
          schema:
            type: string
        - name: tags
          in: query
          schema:
            type: array
            items:
              type: string
        - name: importance
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [long, short]
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Order"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Before"
      responses:
        "200":
          description: 记忆条目列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntryList"

  /xijian/memory/entries/{entry_id}:
    get:
      tags: [xijian.memory]
      operationId: getMemoryEntry
      summary: 获取单条记忆
      parameters:
        - $ref: "#/components/parameters/EntryId"
      responses:
        "200":
          description: 记忆详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntry"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [xijian.memory]
      operationId: updateMemoryEntry
      summary: 修改记忆条目（仅 content/importance/tags 可改）
      parameters:
        - $ref: "#/components/parameters/EntryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                importance:
                  type: number
                  minimum: 0
                  maximum: 1
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: 已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntry"
    delete:
      tags: [xijian.memory]
      operationId: deleteMemoryEntry
      summary: 软删除记忆条目（写入 deleted_at）
      parameters:
        - $ref: "#/components/parameters/EntryId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"

  /xijian/memory/search:
    post:
      tags: [xijian.memory]
      operationId: searchMemory
      summary: 向量检索记忆
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                character_id:
                  type: string
                top_k:
                  type: integer
                  default: 5
                min_score:
                  type: number
                  default: 0.7
      responses:
        "200":
          description: 检索结果
          content:
            application/json:
              schema:
                type: object

  /xijian/memory/consolidate:
    post:
      tags: [xijian.memory]
      operationId: consolidateMemory
      summary: 触发记忆整理（异步），将短期会话提炼为长期记忆
      responses:
        "202":
          description: 已入队
          content:
            application/json:
              schema:
                type: object

  /xijian/memory/forget:
    post:
      tags: [xijian.memory]
      operationId: forgetMemory
      summary: 触发遗忘（按衰减策略或指定条目）
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                entry_ids:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: 遗忘结果
          content:
            application/json:
              schema:
                type: object

  # ===========================================================================
  # 17. 隙间扩展层 - 保护模块（Protection）
  # ===========================================================================
  /xijian/protection/status:
    get:
      tags: [xijian.protection]
      operationId: getProtectionStatus
      summary: 查询保护模块状态
      responses:
        "200":
          description: 状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtectionStatus"

  /xijian/protection/enable:
    post:
      tags: [xijian.protection]
      operationId: enableProtection
      summary: 启用保护系统（无副作用，默认开启）
      responses:
        "200":
          description: 已启用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtectionStatus"

  /xijian/protection/disable:
    post:
      tags: [xijian.protection]
      operationId: disableProtection
      summary: 关闭保护系统（必须双重确认）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [confirmation]
                  properties:
                    confirmation:
                      type: string
                      example: "I understand the risks"
                - type: object
                  required: [challenge_id, phrase]
                  properties:
                    challenge_id:
                      type: string
                    phrase:
                      type: string
      responses:
        "200":
          description: 关闭流程（第一步返回 challenge，第二步返回最终状态）
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProtectionChallenge"
                  - $ref: "#/components/schemas/ProtectionStatus"
        "403":
          $ref: "#/components/responses/Forbidden"

  /xijian/protection/snapshots:
    get:
      tags: [xijian.protection]
      operationId: listSnapshots
      summary: 列出 AI 相关数据的历史版本快照
      responses:
        "200":
          description: 快照列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotList"

  /xijian/protection/snapshots/{snapshot_id}:
    get:
      tags: [xijian.protection]
      operationId: getSnapshot
      summary: 获取快照详细 diff
      parameters:
        - $ref: "#/components/parameters/SnapshotId"
      responses:
        "200":
          description: 快照详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"
        "404":
          $ref: "#/components/responses/NotFound"

  /xijian/protection/rollback:
    post:
      tags: [xijian.protection]
      operationId: rollbackSnapshot
      summary: 数据回滚到指定快照
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [snapshot_id]
              properties:
                snapshot_id:
                  type: string
                scope:
                  type: string
                  example: "character:char_yuki"
                create_backup:
                  type: boolean
                  default: true
      responses:
        "200":
          description: 回滚结果
          content:
            application/json:
              schema:
                type: object

  /xijian/protection/guard/preview:
    post:
      tags: [xijian.protection]
      operationId: guardPreview
      summary: 输入/输出护栏预览（不绕过保护，仅展示判定结果）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [direction, text]
              properties:
                direction:
                  type: string
                  enum: [input, output]
                text:
                  type: string
                context:
                  type: object
                  properties:
                    character_id:
                      type: string
      responses:
        "200":
          description: 护栏判定结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuardPreview"

  /xijian/protection/audit:
    get:
      tags: [xijian.protection]
      operationId: getAuditLog
      summary: 分页查询审计日志（注入尝试、OOC 检测、授权变更、保护开关等）
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Order"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Before"
      responses:
        "200":
          description: 审计日志
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLog"

  /xijian/protection/audit/export:
    post:
      tags: [xijian.protection]
      operationId: exportAuditLog
      summary: 导出审计日志（异步，返回 file_id）
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "202":
          description: 已入队导出任务
          content:
            application/json:
              schema:
                type: object

  # ===========================================================================
  # 18. 隙间扩展层 - 会话与上下文
  # ===========================================================================
  /xijian/sessions:
    post:
      tags: [xijian.session]
      operationId: createSession
      summary: 创建新会话
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                character_id:
                  type: string
                world_id:
                  type: string
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /xijian/sessions/{session_id}/messages:
    post:
      tags: [xijian.session]
      operationId: appendSessionMessage
      summary: 追加消息到会话
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [system, user, assistant, tool]
                content:
                  type: string
      responses:
        "201":
          description: 已追加
          content:
            application/json:
              schema:
                type: object
    get:
      tags: [xijian.session]
      operationId: listSessionMessages
      summary: 列出会话消息
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: 消息列表
          content:
            application/json:
              schema:
                type: object

  /xijian/sessions/{session_id}:
    delete:
      tags: [xijian.session]
      operationId: deleteSession
      summary: 删除会话
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"

  # ===========================================================================
  # 19. 隙间扩展层 - 设置与偏好
  # ===========================================================================
  /xijian/settings:
    get:
      tags: [xijian.settings]
      operationId: getSettings
      summary: 获取当前设置
      responses:
        "200":
          description: 设置
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      tags: [xijian.settings]
      operationId: updateSettings
      summary: 更新设置（可开启软限流、NSFW 等）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: 已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /xijian/settings/permissions:
    get:
      tags: [xijian.settings]
      operationId: getSettingsPermissions
      summary: 查询当前用户已授予的系统权限状态
      responses:
        "200":
          description: 权限状态
          content:
            application/json:
              schema:
                type: object

  # ===========================================================================
  # 20. 隙间扩展层 - 资源与导入
  # ===========================================================================
  /xijian/resources/import:
    post:
      tags: [xijian.resource]
      operationId: importResource
      summary: 异步导入角色/世界/场景资源包（zip/7z）
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                kind:
                  type: string
                  enum: [character, world, scene]
      responses:
        "202":
          description: 已入队导入任务
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJob"

  /xijian/resources/imports/{job_id}:
    get:
      tags: [xijian.resource]
      operationId: getImportJob
      summary: 查询导入任务状态
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: 任务状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJob"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===========================================================================
  # 21. 隙间扩展层 - 备份与恢复（来自功能清单 A1.1 / A5.3）
  # ===========================================================================
  /xijian/characters/{character_id}/memory/entries:
    get:
      tags: [xijian.backup]
      operationId: listCharacterMemoryEntries
      summary: 按角色分页查询记忆条目
      parameters:
        - $ref: "#/components/parameters/CharacterId"
        - name: type
          in: query
          schema:
            type: string
            enum: [long, short]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: 记忆条目列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntryList"
    post:
      tags: [xijian.backup]
      operationId: createCharacterMemoryEntry
      summary: 新增角色记忆条目（type ∈ {long, short}）
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, content]
              properties:
                type:
                  type: string
                  enum: [long, short]
                content:
                  type: string
                importance:
                  type: number
                  minimum: 0
                  maximum: 1
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntry"

  /xijian/entries/{entry_id}:
    patch:
      tags: [xijian.backup]
      operationId: patchEntry
      summary: 修改记忆条目（仅 content/importance/tags 可改）
      parameters:
        - $ref: "#/components/parameters/EntryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                importance:
                  type: number
                  minimum: 0
                  maximum: 1
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: 已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntry"
    delete:
      tags: [xijian.backup]
      operationId: softDeleteEntry
      summary: 软删除记忆条目（写入 deleted_at）
      parameters:
        - $ref: "#/components/parameters/EntryId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"

  /xijian/backups:
    post:
      tags: [xijian.backup]
      operationId: createBackup
      summary: 触发手动备份
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [character_id]
              properties:
                character_id:
                  type: string
                scope:
                  type: string
                  enum: [all, memory_only, state_only, doc_only]
                  default: all
      responses:
        "201":
          description: 已创建备份
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualBackup"

  /xijian/backups/{backup_id}/restore:
    post:
      tags: [xijian.backup]
      operationId: restoreBackup
      summary: 恢复备份（可选 scope）
      parameters:
        - $ref: "#/components/parameters/BackupId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                scope:
                  type: string
                  enum: [all, memory_only, state_only, doc_only]
      responses:
        "200":
          description: 已恢复
          content:
            application/json:
              schema:
                type: object

  /xijian/protected-modules:
    get:
      tags: [xijian.backup]
      operationId: listProtectedModules
      summary: 列出受保护模块
      responses:
        "200":
          description: 受保护模块列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtectedModuleList"

  # ===========================================================================
  # 22. 隙间扩展层 - MCP 桥接（规划中，docs/api.md §11）
  # ===========================================================================
  /xijian/mcp/tools:
    get:
      tags: [xijian.mcp]
      operationId: listMcpTools
      summary: 列出可用的 MCP 工具（规划中）
      responses:
        "200":
          description: 工具列表
          content:
            application/json:
              schema:
                type: object

  /xijian/mcp/tools/{tool_id}/invoke:
    post:
      tags: [xijian.mcp]
      operationId: invokeMcpTool
      summary: 调用 MCP 工具（规划中，受 MCP 防护约束）
      parameters:
        - name: tool_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: 调用结果
          content:
            application/json:
              schema:
                type: object

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: 启动时随机生成，写入 /tmp/xijian-<pid>.token，仅 127.0.0.1 访问

  parameters:
    ModelId:
      name: model_id
      in: path
      required: true
      schema:
        type: string
      description: 模型 ID
    OperationId:
      name: op_id
      in: path
      required: true
      schema:
        type: string
      description: 加载/卸载操作 ID
    VideoId:
      name: video_id
      in: path
      required: true
      schema:
        type: string
    FileId:
      name: file_id
      in: path
      required: true
      schema:
        type: string
    BatchId:
      name: batch_id
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
    AssistantId:
      name: asst_id
      in: path
      required: true
      schema:
        type: string
    ThreadId:
      name: thread_id
      in: path
      required: true
      schema:
        type: string
    MessageId:
      name: msg_id
      in: path
      required: true
      schema:
        type: string
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
    StepId:
      name: step_id
      in: path
      required: true
      schema:
        type: string
    CharacterId:
      name: character_id
      in: path
      required: true
      schema:
        type: string
      description: 角色 ID
    InteractionId:
      name: interaction_id
      in: path
      required: true
      schema:
        type: string
    WorldId:
      name: world_id
      in: path
      required: true
      schema:
        type: string
    EntryId:
      name: entry_id
      in: path
      required: true
      schema:
        type: string
    SnapshotId:
      name: snapshot_id
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
    BackupId:
      name: backup_id
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: 每页数量（默认 20，最大 100）
    Order:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    After:
      name: after
      in: query
      schema:
        type: string
      description: 游标（上一页 last_id）
    Before:
      name: before
      in: query
      schema:
        type: string
      description: 游标（下一页 first_id）

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OAIError"
    Unauthorized:
      description: 鉴权失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OAIError"
    Forbidden:
      description: 权限不足（如关闭保护系统前未双重确认）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OAIError"
    NotFound:
      description: 资源不存在（角色/模型/文件）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OAIError"
    NoContent:
      description: 成功无 body（abort、delete）

  schemas:
    # -------------------------------------------------------------------------
    # 通用错误
    # -------------------------------------------------------------------------
    OAIError:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            type:
              type: string
              example: invalid_request_error
            param:
              type: string
            code:
              type: string
              example: invalid_value
      example:
        error:
          message: "Invalid value for 'temperature': must be between 0 and 2"
          type: invalid_request_error
          param: temperature
          code: invalid_value

    JSONRPCError:
      type: object
      properties:
        jsonrpc:
          type: string
          example: "2.0"
        id:
          type: string
        error:
          type: object
          properties:
            code:
              type: integer
              example: -32602
            message:
              type: string
            data:
              type: object

    # -------------------------------------------------------------------------
    # 模型
    # -------------------------------------------------------------------------
    Model:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: model
        created:
          type: integer
        owned_by:
          type: string
        xijian:
          type: object
          properties:
            backend:
              type: string
              enum: [mlx, gguf]
            family:
              type: string
            size_b:
              type: number
            quant:
              type: string
            context_length:
              type: integer
            min_ram_gb:
              type: integer
            loaded:
              type: boolean

    ModelOperation:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: model.load
        status:
          type: string
          enum: [loading, unloading, completed, failed]
        progress_url:
          type: string

    # -------------------------------------------------------------------------
    # Chat
    # -------------------------------------------------------------------------
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          type: string
        name:
          type: string

    XiJianChatExtension:
      type: object
      description: 隙间特有扩展字段，不影响 OAI 客户端
      properties:
        character_id:
          type: string
          description: 当前角色 ID，启用角色系统 Prompt 注入
        world_id:
          type: string
          description: 当前世界 ID，注入世界状态
        nsfw_allowed:
          type: boolean
          default: false
        inject_memory:
          type: boolean
          default: true
          description: 是否自动检索长期记忆并注入
        memory_top_k:
          type: integer
          default: 5
          description: 注入的记忆条数
        guard_level:
          type: string
          enum: [strict, standard, relaxed]
          default: standard

    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 0.7
        top_p:
          type: number
          default: 1.0
        max_tokens:
          type: integer
        stream:
          type: boolean
          default: false
        stop:
          type: array
          items:
            type: string
        presence_penalty:
          type: number
          default: 0
        frequency_penalty:
          type: number
          default: 0
        n:
          type: integer
          default: 1
        user:
          type: string
        tools:
          type: array
          items:
            type: object
        tool_choice:
          type: string
        response_format:
          type: object
        logprobs:
          type: boolean
        stream_options:
          type: object
        xijian:
          $ref: "#/components/schemas/XiJianChatExtension"

    ChatCompletion:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: chat.completion
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
              finish_reason:
                type: string
              logprobs:
                type: object
                nullable: true
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
        xijian:
          type: object
          properties:
            backend:
              type: string
            guard_triggered:
              type: boolean
            memory_hits:
              type: integer

    ChatCompletionChunk:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: chat.completion.chunk
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              delta:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
              finish_reason:
                type: string
                nullable: true
        usage:
          type: object
          nullable: true

    # -------------------------------------------------------------------------
    # Embeddings
    # -------------------------------------------------------------------------
    EmbeddingRequest:
      type: object
      required: [model, input]
      properties:
        model:
          type: string
          example: bge-m3
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        encoding_format:
          type: string
          enum: [float, base64]
          default: float
        dimensions:
          type: integer
          example: 1024

    EmbeddingResponse:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            type: object
            properties:
              object:
                type: string
              index:
                type: integer
              embedding:
                type: array
                items:
                  type: number
        model:
          type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            total_tokens:
              type: integer

    # -------------------------------------------------------------------------
    # Audio
    # -------------------------------------------------------------------------
    SpeechRequest:
      type: object
      required: [model, input, voice]
      properties:
        model:
          type: string
          example: cosyvoice-tts
        input:
          type: string
        voice:
          type: string
        response_format:
          type: string
          default: mp3
        speed:
          type: number
          default: 1.0
        xijian:
          type: object
          properties:
            voice_clone_ref:
              type: string
            emotion:
              type: string

    Transcription:
      type: object
      properties:
        text:
          type: string

    # -------------------------------------------------------------------------
    # Images
    # -------------------------------------------------------------------------
    ImageGenerationRequest:
      type: object
      required: [model, prompt]
      properties:
        model:
          type: string
        prompt:
          type: string
        n:
          type: integer
          default: 1
        size:
          type: string
          default: "1024x1024"
        response_format:
          type: string
          enum: [url, b64_json]
          default: b64_json
        xijian:
          type: object
          properties:
            negative_prompt:
              type: string
            seed:
              type: integer
            nsfw_allowed:
              type: boolean

    ImageGenerationResponse:
      type: object
      properties:
        created:
          type: integer
        data:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              b64_json:
                type: string

    # -------------------------------------------------------------------------
    # Video
    # -------------------------------------------------------------------------
    VideoGenerationRequest:
      type: object
      required: [model, prompt]
      properties:
        model:
          type: string
        prompt:
          type: string
        input_reference:
          type: string
        seconds:
          type: integer
          default: 4
        size:
          type: string
          default: "1280x720"
        fps:
          type: integer
          default: 24
        xijian:
          type: object
          properties:
            seed:
              type: integer
            nsfw_allowed:
              type: boolean

    VideoGeneration:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: video.generation
        status:
          type: string
          enum: [queued, in_progress, completed, failed]
        created_at:
          type: integer
        completed_at:
          type: integer
          nullable: true
        expires_at:
          type: integer
        error:
          type: object
          nullable: true
        url:
          type: string
          nullable: true
        remixed_from_video_id:
          type: string
          nullable: true

    VideoList:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            $ref: "#/components/schemas/VideoGeneration"
        has_more:
          type: boolean

    # -------------------------------------------------------------------------
    # Files
    # -------------------------------------------------------------------------
    FileObject:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: file
        bytes:
          type: integer
        created_at:
