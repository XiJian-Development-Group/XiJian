openapi: 3.0.3
info:
  title: 隙间（XiJian）本地 API 协议规范
  version: "1.0.0"
  description: |
    「隙间」跨平台本地 API 的完整 OpenAPI 3.0 规范。

    ## 架构总览
    隙间本地 API 是 **「OAI 兼容 + 隙间扩展」** 的双协议栈：

    - **OAI 兼容层** (`/v1/*`)：完整实现 OpenAI 官方 API 表面（chat / embeddings / audio / images / video / models / files / fine-tuning 等），第三方客户端（openai-python、langchain、llama-index）可零修改接入。
    - **隙间扩展层** (`/v1/xijian/*`)：以命名空间承载项目特有能力（角色、互动、世界、记忆、保护模块等）。

    ## 传输
    - HTTP + SSE + WebSocket 三栈并行。请求-响应 → HTTP；流式生成 → SSE 或 NDJSON；双向推送（角色主动消息、AI 控制信号）→ WebSocket (`ws://127.0.0.1:{port}/v1/ws`)。
    - 流式协议 SSE 与 NDJSON 同时支持，由客户端通过 `Accept` 头协商。

    ## 鉴权
    - Bearer Token，启动时随机生成，仅 `127.0.0.1` 访问。

    ## 错误格式
    - 双格式共存：`Accept: application/json` 返回 OAI 错误；`Accept: application/json-rpc` 返回 JSON-RPC 2.0 错误。

    ## 参考文档
    - 详细协议见 `docs/api.md`
    - 功能清单见 `docs/Dev. Function List功能清单v2.md`
  license:
    name: 完全开源、无付费、无广告
    identifier: MIT

servers:
  - url: http://127.0.0.1:{port}/v1
    description: 本地环回地址（仅监听 127.0.0.1，绝不暴露 0.0.0.0）
    variables:
      port:
        default: "8000"
        description: 由主 UI 进程通过临时文件 /tmp/xijian-<pid>.port 传递

security:
  - bearerAuth: []

tags:
  - name: root
    description: 服务端元信息与健康检查
  - name: models
    description: OAI 兼容模型管理
  - name: chat
    description: OAI 兼容 Chat Completions
  - name: embeddings
    description: OAI 兼容 Embeddings
  - name: audio
    description: OAI 兼容音频（TTS / STT / 翻译）
  - name: images
    description: OAI 兼容图像生成
  - name: video
    description: OAI 兼容视频生成
  - name: files
    description: OAI 兼容文件管理
  - name: batches
    description: OAI 兼容批处理
  - name: fine-tuning
    description: OAI 兼容微调
  - name: assistants
    description: OAI 兼容 Assistants / Threads / Runs（可选模块）
  - name: completions-legacy
    description: OAI 兼容 Legacy Completions
  - name: abort
    description: 请求取消与中断
  - name: xijian.character
    description: 隙间扩展 - 角色系统
  - name: xijian.interaction
    description: 隙间扩展 - 互动系统
  - name: xijian.world
    description: 隙间扩展 - 模拟世界系统
  - name: xijian.memory
    description: 隙间扩展 - 记忆系统
  - name: xijian.protection
    description: 隙间扩展 - 保护模块（安全）
  - name: xijian.session
    description: 隙间扩展 - 会话与上下文
  - name: xijian.settings
    description: 隙间扩展 - 设置与偏好
  - name: xijian.resource
    description: 隙间扩展 - 资源与导入
  - name: xijian.backup
    description: 隙间扩展 - 备份与快照
  - name: xijian.mcp
    description: 隙间扩展 - MCP 桥接（规划中）

paths:
  # ===========================================================================
  # 0. 根信息 & 健康检查
  # ===========================================================================
  /:
    get:
      tags: [root]
      operationId: getRoot
      summary: 查询服务端版本与能力集
      security: []
      responses:
        "200":
          description: 服务端元信息
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  api_version:
                    type: string
                    example: "1.0.0"
                  capabilities:
                    type: array
                    items:
                      type: string
                example:
                  version: "1.0.0"
                  api_version: "1.0.0"
                  capabilities: ["oai_compatible", "xijian_extensions", "websocket"]

  /healthz:
    get:
      tags: [root]
      operationId: healthz
      summary: 进程握手健康检查
      security: []
      responses:
        "200":
          description: 约定文本（如 XIJIAN_OK_v1）
          content:
            text/plain:
              schema:
                type: string
                example: "XIJIAN_OK_v1"

  # ===========================================================================
  # 1. 模型管理（OAI 兼容）
  # ===========================================================================
  /models:
    get:
      tags: [models]
      operationId: listModels
      summary: 列出当前可用模型
      responses:
        "200":
          description: 模型列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Model"
              example:
                object: list
                data:
                  - id: qwen2.5-7b-mlx-4bit
                    object: model
                    created: 1718000000
                    owned_by: xijian
                    xijian:
                      backend: mlx
                      family: qwen2.5
                      size_b: 7.0
                      quant: 4bit
                      context_length: 32768
                      min_ram_gb: 8
                      loaded: true

  /models/{model_id}:
    get:
      tags: [models]
      operationId: getModel
      summary: 获取单个模型详情
      parameters:
        - $ref: "#/components/parameters/ModelId"
      responses:
        "200":
          description: 模型详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Model"
        "404":
          $ref: "#/components/responses/NotFound"

  /models/{model_id}/load:
    post:
      tags: [models]
      operationId: loadModel
      summary: 触发模型加载（异步）
      parameters:
        - $ref: "#/components/parameters/ModelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gpu_layers:
                  type: integer
                  default: -1
                context_length:
                  type: integer
                  example: 8192
      responses:
        "202":
          description: 加载中
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelOperation"

  /models/{model_id}/unload:
    post:
      tags: [models]
      operationId: unloadModel
      summary: 释放模型（同步）
      parameters:
        - $ref: "#/components/parameters/ModelId"
      responses:
        "200":
          description: 已卸载
          content:
            application/json:
              schema:
                type: object

  /models/operations/{op_id}:
    get:
      tags: [models]
      operationId: getModelOperation
      summary: 查询加载/卸载操作状态
      parameters:
        - $ref: "#/components/parameters/OperationId"
      responses:
        "200":
          description: 操作状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelOperation"

  # ===========================================================================
  # 2. Chat Completions（OAI 兼容）
  # ===========================================================================
  /chat/completions:
    post:
      tags: [chat]
      operationId: createChatCompletion
      summary: 创建对话补全（完整 OAI 兼容，支持流式/工具调用）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: 非流式补全
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletion"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ChatCompletionChunk"
            application/x-ndjson:
              schema:
                $ref: "#/components/schemas/ChatCompletionChunk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ===========================================================================
  # 3. Embeddings（OAI 兼容）
  # ===========================================================================
  /embeddings:
    post:
      tags: [embeddings]
      operationId: createEmbedding
      summary: 创建向量嵌入（用于记忆检索）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbeddingRequest"
      responses:
        "200":
          description: 嵌入结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingResponse"

  # ===========================================================================
  # 4. Audio（OAI 兼容）
  # ===========================================================================
  /audio/speech:
    post:
      tags: [audio]
      operationId: createSpeech
      summary: 文本转语音（TTS）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpeechRequest"
      responses:
        "200":
          description: 音频流
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary

  /audio/transcriptions:
    post:
      tags: [audio]
      operationId: createTranscription
      summary: 语音转文字（STT，multipart/form-data）
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                model:
                  type: string
                language:
                  type: string
                prompt:
                  type: string
                response_format:
                  type: string
                  enum: [json, text, srt, vtt]
                  default: json
                temperature:
                  type: number
      responses:
        "200":
          description: 转写结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transcription"

  /audio/translations:
    post:
      tags: [audio]
      operationId: createTranslation
      summary: 音频翻译为目标语言（默认英文）
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                model:
                  type: string
                language:
                  type: string
                prompt:
                  type: string
                response_format:
                  type: string
                temperature:
                  type: number
      responses:
        "200":
          description: 翻译结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transcription"

  # ===========================================================================
  # 5. Images（OAI 兼容）
  # ===========================================================================
  /images/generations:
    post:
      tags: [images]
      operationId: createImage
      summary: 文本生成图像（含角色一致性参考）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageGenerationRequest"
      responses:
        "200":
          description: 图像生成结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGenerationResponse"

  /images/edits:
    post:
      tags: [images]
      operationId: createImageEdit
      summary: 图像编辑（multipart/form-data）
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                mask:
                  type: string
                  format: binary
                prompt:
                  type: string
                n:
                  type: integer
                size:
                  type: string
                response_format:
                  type: string
                model:
                  type: string
      responses:
        "200":
          description: 编辑结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGenerationResponse"

  /images/variations:
    post:
      tags: [images]
      operationId: createImageVariation
      summary: 图像变体（multipart/form-data）
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                n:
                  type: integer
                size:
                  type: string
                response_format:
                  type: string
                model:
                  type: string
      responses:
        "200":
          description: 变体结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGenerationResponse"

  # ===========================================================================
  # 6. Video（OAI 兼容）
  # ===========================================================================
  /videos/generations:
    post:
      tags: [video]
      operationId: createVideo
      summary: 文本生成视频（默认异步，返回 202）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoGenerationRequest"
      responses:
        "202":
          description: 任务已入队
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoGeneration"

  /videos:
    get:
      tags: [video]
      operationId: listVideos
      summary: 分页列出历史视频生成任务
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Order"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Before"
      responses:
        "200":
          description: 任务列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoList"

  /videos/{video_id}:
    get:
      tags: [video]
      operationId: getVideo
      summary: 查询视频生成任务状态
      parameters:
        - $ref: "#/components/parameters/VideoId"
      responses:
        "200":
          description: 任务状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoGeneration"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [video]
      operationId: deleteVideo
      summary: 删除视频任务与对应文件
      parameters:
        - $ref: "#/components/parameters/VideoId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"

  /videos/{video_id}/remix:
    post:
      tags: [video]
      operationId: remixVideo
      summary: 基于已有视频做二次生成
      parameters:
        - $ref: "#/components/parameters/VideoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
      responses:
        "202":
          description: 二次生成任务已入队
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoGeneration"

  # ===========================================================================
  # 7. Files（OAI 兼容）
  # ===========================================================================
  /files:
    post:
      tags: [files]
      operationId: createFile
      summary: 上传文件（multipart/form-data）
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                purpose:
                  type: string
                  enum: [assistants, vision, evals, fine-tune, user_data]
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileObject"
    get:
      tags: [files]
      operationId: listFiles
      summary: 列出文件
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Order"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Before"
      responses:
        "200":
          description: 文件列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileList"

  /files/{file_id}:
    get:
      tags: [files]
      operationId: getFile
      summary: 获取文件元信息
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: 文件元信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileObject"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [files]
      operationId: deleteFile
      summary: 删除文件
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"

  /files/{file_id}/content:
    get:
      tags: [files]
      operationId: getFileContent
      summary: 下载文件二进制内容
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: 二进制内容
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

  # ===========================================================================
  # 8. Batches（OAI 兼容）
  # ===========================================================================
  /batches:
    post:
      tags: [batches]
      operationId: createBatch
      summary: 创建批处理任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input_file_id, endpoint, completion_window]
              properties:
                input_file_id:
                  type: string
                endpoint:
                  type: string
                  example: /v1/chat/completions
                completion_window:
                  type: string
                  example: "24h"
                metadata:
                  type: object
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema:
                type: object

  /batches/{batch_id}:
    get:
      tags: [batches]
      operationId: getBatch
      summary: 查询批处理任务
      parameters:
        - $ref: "#/components/parameters/BatchId"
      responses:
        "200":
          description: 任务状态
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"

  /batches/{batch_id}/results:
    get:
      tags: [batches]
      operationId: getBatchResults
      summary: 下载批处理结果文件
      parameters:
        - $ref: "#/components/parameters/BatchId"
      responses:
        "200":
          description: 结果文件
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /batches/{batch_id}/cancel:
    post:
      tags: [batches]
      operationId: cancelBatch
      summary: 取消批处理任务
      parameters:
        - $ref: "#/components/parameters/BatchId"
      responses:
        "200":
          description: 已取消
          content:
            application/json:
              schema:
                type: object

  # ===========================================================================
  # 9. Fine-tuning（OAI 兼容）
  # ===========================================================================
  /fine_tuning/jobs:
    post:
      tags: [fine-tuning]
      operationId: createFineTuningJob
      summary: 创建微调任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema:
                type: object
    get:
      tags: [fine-tuning]
      operationId: listFineTuningJobs
      summary: 列出微调任务
      responses:
        "200":
          description: 任务列表
          content:
            application/json:
              schema:
                type: object

  /fine_tuning/jobs/{job_id}:
    get:
      tags: [fine-tuning]
      operationId: getFineTuningJob
      summary: 查询微调任务
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: 任务详情
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"

  /fine_tuning/jobs/{job_id}/cancel:
    post:
      tags: [fine-tuning]
      operationId: cancelFineTuningJob
      summary: 取消微调任务
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: 已取消
          content:
            application/json:
              schema:
                type: object

  /fine_tuning/jobs/{job_id}/events:
    get:
      tags: [fine-tuning]
      operationId: listFineTuningEvents
      summary: 查询微调任务事件
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: 事件列表
          content:
            application/json:
              schema:
                type: object

  /fine_tuning/jobs/{job_id}/checkpoints:
    get:
      tags: [fine-tuning]
      operationId: listFineTuningCheckpoints
      summary: 查询微调检查点
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: 检查点列表
          content:
            application/json:
              schema:
                type: object

  /fine_tuning/jobs/{job_id}/checkpoints/permissions:
    post:
      tags: [fine-tuning]
      operationId: createFineTuningCheckpointPermissions
      summary: 设置微调检查点权限
      parameters:
        - $ref: "#/components/parameters/JobId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: 已设置
          content:
            application/json:
              schema:
                type: object

  # ===========================================================================
  # 10. Assistants / Threads / Runs（OAI 兼容，可选模块）
  # ===========================================================================
  /assistants:
    post:
      tags: [assistants]
      operationId: createAssistant
      summary: 创建 Assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema:
                type: object
    get:
      tags: [assistants]
      operationId: listAssistants
      summary: 列出 Assistant
      responses:
        "200":
          description: 列表
          content:
            application/json:
              schema:
                type: object

  /assistants/{asst_id}:
    get:
      tags: [assistants]
      operationId: getAssistant
      summary: 获取 Assistant
      parameters:
        - $ref: "#/components/parameters/AssistantId"
      responses:
        "200":
          description: 详情
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [assistants]
      operationId: modifyAssistant
      summary: 修改 Assistant
      parameters:
        - $ref: "#/components/parameters/AssistantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: 已修改
          content:
            application/json:
              schema:
                type: object
    delete:
      tags: [assistants]
      operationId: deleteAssistant
      summary: 删除 Assistant
      parameters:
        - $ref: "#/components/parameters/AssistantId"
