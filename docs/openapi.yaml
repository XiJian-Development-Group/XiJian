x-webhooks:
  # OpenAPI 3.0 通过 x-webhooks 描述 WebSocket 推送事件
  character.proactive_message:
    post:
      summary: 角色主动消息推送（server→client）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                type:
                  type: string
                  example: character.proactive_message
                ts:
                  type: integer
                data:
                  type: object
      responses:
        "200":
          description: 接收确认
  world.state_changed:
    post:
      summary: 世界状态变化推送（server→client）
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: 接收确认

x-xijian-ws-events:
  # WebSocket 事件类型总表（ws://127.0.0.1:{port}/v1/ws）
  connection:
    protocol: "xijian.v1, bearer.<token>"
  events:
    - { type: hello, direction: server→client, desc: 连接建立成功 }
    - { type: ping, direction: bidirectional, desc: 心跳（30s 间隔） }
    - { type: pong, direction: bidirectional, desc: 心跳响应 }
    - { type: auth.ok, direction: server→client, desc: 鉴权结果 }
    - { type: auth.failed, direction: server→client, desc: 鉴权失败 }
    - { type: character.proactive_message, direction: server→client, desc: 角色主动消息 }
    - { type: character.emotion_changed, direction: server→client, desc: 角色情感变化 }
    - { type: character.action_triggered, direction: server→client, desc: 角色动作触发 }
    - { type: world.event_occurred, direction: server→client, desc: 世界事件 }
    - { type: world.state_changed, direction: server→client, desc: 世界状态变化 }
    - { type: memory.consolidated, direction: server→client, desc: 记忆整理完成 }
    - { type: protection.alert, direction: server→client, desc: 保护模块告警 }
    - { type: generation.progress, direction: server→client, desc: 异步生成进度 }
    - { type: generation.completed, direction: server→client, desc: 异步生成完成 }
    - { type: generation.failed, direction: server→client, desc: 异步生成失败 }
    - { type: desktop_pet.emergency_pause, direction: client→server, desc: 桌宠紧急暂停 }
    - { type: desktop_pet.command, direction: client→server, desc: 桌宠控制指令 }
    - { type: client.cancel_request, direction: client→server, desc: 客户端主动取消某 request_id }
