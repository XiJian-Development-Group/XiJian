# build-devkit.yml — 跨平台构建独立的「隙间开发者工具」
#
# 触发：
#   * tag v*                 — 发布正式产物
#   * workflow_dispatch      — 手动跑
#   * push main 上改动 devkit/ — 跑 smoke build（不发布）
#
# 矩阵：macOS arm64 + Windows（pywebview 用的 webview 跟系统绑定，
#       跨编译暂时不做；Linux 因为需要 gtk 系依赖先不开）
#
# 产物命名：
#   macOS:  XiJianDevKit.app         (在 dist/XiJianDevKit.app)
#   Windows: XiJianDevKit.exe         (单文件，在 dist/XiJianDevKit.exe)
#   通用:    xijian-devkit/ (onedir, macOS 用于打包 .app)

name: build-devkit

on:
  push:
    branches: [main]
    paths:
      - "devkit/**"
      - ".github/workflows/build-devkit.yml"
  pull_request:
    paths:
      - "devkit/**"
      - ".github/workflows/build-devkit.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "build target (all | dir | app)"
        required: false
        default: all
        type: choice
        options:
          - all
          - dir
          - app
  release:
    types: [published]

permissions:
  contents: write  # 发布到 release 需要写权限

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: all
            artifact_name: xijian-devkit-macos-arm64
          - os: windows-latest
            target: dir
            artifact_name: xijian-devkit-windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PyInstaller work tree
        uses: actions/cache@v4
        with:
          path: |
            devkit/.venv
            devkit/build
            devkit/dist
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('devkit/requirements.txt', 'devkit/pyproject.toml', 'devkit/xijian-devkit.spec') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cd devkit
          chmod +x build-devkit.sh
          ./build-devkit.sh --target=${{ matrix.target }}

      - name: Package macOS (DevKit_macOS.zip)
        if: runner.os == 'macOS'
        run: |
          cd devkit/dist
          zip -r DevKit_macOS.zip XiJianDevKit.app

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd devkit
          chmod +x build-devkit.sh
          ./build-devkit.sh --target=${{ matrix.target }}

      - name: Package Windows (DevKit_Windows.zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "==> packaging Windows artifact..."
          if (Test-Path "devkit/dist/XiJianDevKit.exe") {
            cd devkit/dist
            Compress-Archive -Path "XiJianDevKit.exe" -DestinationPath "DevKit_Windows.zip" -Force
            Write-Host "Created DevKit_Windows.zip"
          }

      - name: List artifacts
        shell: bash
        run: |
          echo "==> dist contents:"
          ls -la devkit/dist 2>&1 || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            devkit/dist/xijian-devkit
            devkit/dist/DevKit_macOS.zip
            devkit/dist/DevKit_Windows.zip
          if-no-files-found: warn
          retention-days: 14

  release:
    name: attach to release
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded artifacts
        run: ls -laR artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/DevKit_macOS.zip
            artifacts/**/DevKit_Windows.zip
            artifacts/**/xijian-devkit
          fail_on_unmatched_files: false