name: XiJian
options:
  bundleIdPrefix: com.xijian
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0

targets:
  XiJian:
    type: application
    platform: macOS
    sources:
      - path: XiJian
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xijian.app
        PRODUCT_NAME: "隙间"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: XiJian/Info.plist
        CODE_SIGN_ENTITLEMENTS: XiJian/Entitlements.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: MarkdownUI
    preBuildScripts:
      - name: "Check Python Environment"
        script: |
          # Verify Python 3.12+ is available for building
          PYTHON_VERSION=$(python3 --version 2>&1 | grep -oE '[0-9]+\.[0-9]+' | head -1)
          MAJOR=$(echo "$PYTHON_VERSION" | cut -d. -f1)
          MINOR=$(echo "$PYTHON_VERSION" | cut -d. -f2)
          if [[ "$MAJOR" -lt 3 ]] || [[ "$MAJOR" -eq 3 && "$MINOR" -lt 12 ]]; then
            echo "warning: Python 3.12+ recommended (found $PYTHON_VERSION)"
          fi
        basedOnDependencyAnalysis: false
    info:
      path: XiJian/Info.plist
      properties:
        CFBundleDisplayName: "隙间"
        CFBundleName: "XiJian"
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        NSHighResolutionCapable: YES
        NSHumanReadableCopyright: "© 2026 XiJian Development Group"
        ITSAppUsesNonExemptEncryption: false
